# GitHub Actions 專用：自動化部署 Vite + Vue 3 至 GitHub Pages
name: Deploy Vue Project to Pages

on:
  # 當 main 分支有程式碼推送時觸發
  push:
    branches: ["main"]

  # 允許從 Actions 頁籤手動觸發
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同一時間僅有一個部署工作，避免競合
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 檢出原始碼 (Checkout)
        uses: actions/checkout@v4

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 安裝專案依賴 (Install Dependencies)
        run: npm install

      - name: 🏗️ 執行編譯建置 (Build)
        run: npm run build

      - name: 📁 設定 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 上傳編譯成品 (Upload Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 預設的編譯輸出資料夾為 dist
          path: './dist'

      - name: 🚀 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
